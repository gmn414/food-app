<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI减脂营养师 — 扫码体验</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: linear-gradient(160deg, #0A1A0B 0%, #132A16 40%, #1B3A1E 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    -webkit-font-smoothing: antialiased;
  }

  .card {
    background: rgba(255, 255, 255, 0.04);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 28px;
    padding: 48px 40px 40px;
    text-align: center;
    max-width: 420px;
    width: 90%;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.05) inset;
  }

  .logo {
    width: 64px; height: 64px;
    border-radius: 50%;
    background: linear-gradient(135deg, #1B5E20 0%, #4CAF50 100%);
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
    margin: 0 auto 16px;
    box-shadow: 0 8px 24px rgba(76, 175, 80, 0.3);
  }

  .title {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 3px;
    margin-bottom: 6px;
  }

  .subtitle {
    font-size: 14px;
    color: rgba(255, 255, 255, 0.5);
    margin-bottom: 32px;
    letter-spacing: 1px;
  }

  .qr-wrapper {
    background: #fff;
    border-radius: 20px;
    padding: 16px;
    display: inline-block;
    margin-bottom: 20px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    line-height: 0;
  }

  .qr-wrapper img {
    display: block;
    border-radius: 8px;
    width: 260px;
    height: 260px;
  }

  .url-display {
    font-size: 13px;
    color: rgba(255, 255, 255, 0.6);
    background: rgba(255, 255, 255, 0.06);
    border-radius: 12px;
    padding: 12px 20px;
    word-break: break-all;
    margin-bottom: 20px;
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    letter-spacing: 0.5px;
  }

  .url-link {
    font-size: 12px;
    color: rgba(255, 255, 255, 0.35);
    margin-bottom: 20px;
  }

  .url-link a {
    color: rgba(255, 255, 255, 0.5);
    text-decoration: underline;
    text-underline-offset: 3px;
  }

  .url-link a:hover {
    color: #4CAF50;
  }

  .footer {
    font-size: 12px;
    color: rgba(255, 255, 255, 0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #4CAF50;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.4; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.5); }
  }

  .tag-row {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .tag {
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid rgba(255, 255, 255, 0.15);
    color: rgba(255, 255, 255, 0.6);
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<div class="card">
  <div class="logo">🥗</div>
  <div class="title">AI减脂营养师</div>
  <div class="subtitle">让每一餐都有数</div>

  <div class="tag-row">
    <span class="tag">AI食物识别</span>
    <span class="tag">营养分析</span>
    <span class="tag">减脂建议</span>
  </div>

  <div class="qr-wrapper">
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=https://gmn414.github.io/food-app/"
         alt="扫码打开 AI减脂营养师"
         width="260" height="260"
         loading="eager">
  </div>

  <div class="url-display">https://gmn414.github.io/food-app/</div>

  <div class="url-link">
    无法扫码？👉 <a href="https://gmn414.github.io/food-app/" target="_blank">直接打开App</a>
  </div>

  <div class="footer">
    <div class="dot"></div>
    <span>扫码即刻体验</span>
  </div>
</div>

</body>
</html>
