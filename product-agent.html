<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>产品开发AI助手</title>
<style>
  :root {
    --blue: #2563EB;
    --blue-light: #EFF6FF;
    --blue-dark: #1D4ED8;
    --green: #10B981;
    --red: #EF4444;
    --gray-50: #F9FAFB;
    --gray-100: #F3F4F6;
    --gray-200: #E5E7EB;
    --gray-300: #D1D5DB;
    --gray-400: #9CA3AF;
    --gray-500: #6B7280;
    --gray-700: #374151;
    --gray-900: #111827;
    --radius: 12px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', sans-serif;
    background: var(--gray-50);
    color: var(--gray-900);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .app {
    max-width: 860px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background: #fff;
    box-shadow: 0 0 0 1px var(--gray-200);
  }

  @media (min-width: 861px) {
    .app { min-height: 100vh; border-left: 1px solid var(--gray-200); border-right: 1px solid var(--gray-200); }
  }

  /* ── Header ── */
  .header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--gray-200);
    background: #fff;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .header-title {
    font-size: 20px;
    font-weight: 700;
    color: var(--gray-900);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .header-title .icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    background: var(--blue);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .btn-new-session {
    font-size: 13px;
    padding: 6px 14px;
    border-radius: 8px;
    border: 1px solid var(--gray-300);
    background: #fff;
    color: var(--gray-700);
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-new-session:hover { background: var(--gray-50); border-color: var(--gray-400); }

  /* Progress bar */
  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .progress-wrap.visible { opacity: 1; }

  .progress-track {
    flex: 1;
    height: 6px;
    background: var(--gray-200);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--blue), #3B82F6);
    border-radius: 3px;
    transition: width 0.5s ease;
    width: 0%;
  }

  .progress-text {
    font-size: 13px;
    color: var(--gray-500);
    white-space: nowrap;
    min-width: 70px;
    text-align: right;
  }

  /* ── Chat Area ── */
  .chat-area {
    flex: 1;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    overflow-y: auto;
  }

  /* Welcome */
  .welcome-msg {
    text-align: center;
    padding: 32px 20px;
    color: var(--gray-500);
  }
  .welcome-msg .big-icon {
    font-size: 48px;
    margin-bottom: 12px;
  }
  .welcome-msg h2 {
    font-size: 18px;
    color: var(--gray-700);
    margin-bottom: 8px;
  }
  .welcome-msg p {
    font-size: 14px;
    line-height: 1.6;
  }
  .welcome-tags {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 16px;
  }
  .welcome-tag {
    font-size: 13px;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--gray-300);
    background: #fff;
    color: var(--gray-700);
    cursor: pointer;
    transition: all 0.15s;
  }
  .welcome-tag:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-light); }

  /* User message */
  .msg-user {
    display: flex;
    justify-content: flex-end;
  }
  .msg-user .bubble {
    background: var(--blue);
    color: #fff;
    padding: 10px 18px;
    border-radius: 18px 18px 4px 18px;
    max-width: 70%;
    font-size: 15px;
    line-height: 1.5;
  }

  /* Step card */
  .step-card {
    border: 1px solid var(--gray-200);
    border-radius: var(--radius);
    background: #fff;
    box-shadow: var(--shadow);
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .step-card.completed { border-left: 4px solid var(--green); }
  .step-card.loading-card { border-left: 4px solid var(--blue); }
  .step-card.error { border-left: 4px solid var(--red); }

  .step-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
  }
  .step-card-header:hover { background: var(--gray-50); }

  .step-card-left {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
  }

  .step-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .step-card.completed .step-icon { background: #ECFDF5; }
  .step-card.loading-card .step-icon { background: var(--blue-light); }

  .step-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--gray-900);
  }
  .step-status {
    font-size: 12px;
    color: var(--gray-500);
    margin-left: 4px;
  }

  .step-card-actions {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }

  .btn-icon {
    width: 30px;
    height: 30px;
    border-radius: 6px;
    border: 1px solid var(--gray-200);
    background: #fff;
    cursor: pointer;
    font-size: 13px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--gray-500);
    transition: all 0.15s;
  }
  .btn-icon:hover { background: var(--gray-50); border-color: var(--gray-300); color: var(--gray-700); }
  .btn-icon.regenerating { animation: spin 1s linear infinite; pointer-events: none; opacity: 0.6; }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .chevron {
    font-size: 12px;
    color: var(--gray-400);
    transition: transform 0.2s;
  }
  .step-card.expanded .chevron { transform: rotate(180deg); }

  .step-card-body {
    padding: 0 18px;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.35s ease, padding 0.35s ease;
  }
  .step-card.expanded .step-card-body {
    max-height: 4000px;
    padding: 0 18px 18px;
  }

  .step-card-content {
    font-size: 14px;
    line-height: 1.75;
    color: var(--gray-700);
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* Shimmer loading inside card body */
  .shimmer { padding: 8px 0; }
  .shimmer-line {
    height: 12px;
    border-radius: 6px;
    background: linear-gradient(90deg, var(--gray-100) 25%, var(--gray-50) 50%, var(--gray-100) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    margin-bottom: 10px;
  }
  .shimmer-line.medium { width: 70%; }
  .shimmer-line.short { width: 45%; }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* Copy-all bar */
  .copy-all-bar {
    text-align: center;
    padding: 0;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s, padding 0.3s, margin 0.3s;
  }
  .copy-all-bar.visible {
    max-height: 60px;
    padding: 8px 0 4px;
  }

  .btn-copy-all {
    font-size: 14px;
    padding: 10px 28px;
    border-radius: 10px;
    border: none;
    background: var(--blue);
    color: #fff;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-copy-all:hover { background: var(--blue-dark); }
  .btn-copy-all.copied { background: var(--green); }

  /* ── Input Area ── */
  .input-area {
    padding: 16px 24px;
    border-top: 1px solid var(--gray-200);
    background: #fff;
    display: flex;
    gap: 10px;
    position: sticky;
    bottom: 0;
  }

  .input-field {
    flex: 1;
    padding: 12px 16px;
    border: 1.5px solid var(--gray-300);
    border-radius: 12px;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
  }
  .input-field:focus { border-color: var(--blue); }
  .input-field:disabled { background: var(--gray-100); }

  .btn-send {
    padding: 12px 24px;
    border-radius: 12px;
    border: none;
    background: var(--blue);
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s, opacity 0.15s;
    font-family: inherit;
  }
  .btn-send:hover { background: var(--blue-dark); }
  .btn-send:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--gray-900);
    color: #fff;
    padding: 10px 24px;
    border-radius: 10px;
    font-size: 14px;
    z-index: 100;
    opacity: 0;
    transition: all 0.3s ease;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Responsive */
  @media (max-width: 600px) {
    .header { padding: 14px 16px 12px; }
    .header-title { font-size: 17px; }
    .chat-area { padding: 14px 12px; gap: 12px; }
    .input-area { padding: 12px; }
    .step-card-header { padding: 12px 14px; }
    .step-card-body { padding: 0 14px; }
    .step-card.expanded .step-card-body { padding: 0 14px 14px; }
  }
</style>
</head>
<body>

<div class="app">
  <!-- Header -->
  <header class="header">
    <div class="header-top">
      <div class="header-title">
        <div class="icon">🚀</div>
        产品开发AI助手
      </div>
      <button class="btn-new-session" onclick="resetSession()" id="btn-new-session" style="display:none;">＋ 新会话</button>
    </div>
    <div class="progress-wrap" id="progress-wrap">
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="progress-text" id="progress-text">0/7 步骤</div>
    </div>
  </header>

  <!-- Chat Area -->
  <div class="chat-area" id="chat-area">
    <div class="welcome-msg" id="welcome-msg">
      <div class="big-icon">📦</div>
      <h2>欢迎使用产品开发AI助手</h2>
      <p>输入一个产品品类名称，AI将自动完成从市场洞察到上市跟进的<br>全流程7步分析，为您输出完整的产品方案。</p>
      <div class="welcome-tags">
        <span class="welcome-tag" onclick="quickStart('智能计数跳绳')">智能计数跳绳</span>
        <span class="welcome-tag" onclick="quickStart('便携咖啡机')">便携咖啡机</span>
        <span class="welcome-tag" onclick="quickStart('降噪睡眠眼罩')">降噪睡眠眼罩</span>
        <span class="welcome-tag" onclick="quickStart('折叠露营椅')">折叠露营椅</span>
        <span class="welcome-tag" onclick="quickStart('宠物自动喂食器')">宠物自动喂食器</span>
      </div>
    </div>

    <div class="copy-all-bar" id="copy-all-bar">
      <button class="btn-copy-all" id="btn-copy-all" onclick="copyAll()">📋 复制全部方案</button>
    </div>
  </div>

  <!-- Input Area -->
  <div class="input-area">
    <input
      class="input-field"
      id="input-category"
      type="text"
      placeholder="输入产品品类名称，如：智能计数跳绳..."
      onkeydown="if(event.key==='Enter')startGeneration()"
    >
    <button class="btn-send" id="btn-send" onclick="startGeneration()">开始分析</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="js/product-agent.js"></script>

</body>
</html>
